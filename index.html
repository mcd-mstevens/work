<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work — Monte Carlo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="doc">

  <h1 class="cover-title">Work</h1>

  <div class="section">
    <p class="section-label">Design</p>
    <div class="group">
      <a href="https://mc-1.lovable.app/" class="group-link" target="_blank" rel="noopener">
        <span class="group-name">Monte Carlo 1</span>
        <span class="link-badge link-badge-green">Active</span>
      </a>
      <a href="https://mc-ia.lovable.app/" class="group-link" target="_blank" rel="noopener">
        <span class="group-name">Monte Carlo IA</span>
        <span class="link-badge link-badge-green">Active</span>
      </a>
      <a href="https://b0b.lovable.app/" class="group-link" target="_blank" rel="noopener">
        <span class="group-name">Bob</span>
        <span class="link-badge">Archive</span>
      </a>
      <a href="https://mc-2.lovable.app/" class="group-link" target="_blank" rel="noopener">
        <span class="group-name">Bob exploration</span>
        <span class="link-badge">Archive</span>
      </a>
    </div>
  </div>

  <div class="section">
    <p class="section-label">Product</p>
    <div class="group">
      <a href="alert-detail-report.html" class="group-link">
        <span class="group-name">Alerts and incidents</span>
        <span class="link-badge">Reference</span>
      </a>
      <a href="inbox-usage.html" class="group-link">
        <span class="group-name">Inbox usage</span>
        <span class="link-badge">Reference</span>
      </a>
      <a href="product-analytics.html" class="group-link">
        <span class="group-name">Product analytics</span>
        <span class="link-badge">Reference</span>
      </a>
      <a href="cli-principles.html" class="group-link">
        <span class="group-name">CLI principles</span>
        <span class="link-badge">Reference</span>
      </a>
    </div>
  </div>

  <div class="section">
    <p class="section-label">Engineering</p>
    <div class="group">
      <div id="pr-list"><span class="pr-loading">Loading&hellip;</span></div>
    </div>
  </div>

</div>

<script>
(async function () {
  const el = document.getElementById('pr-list');
  try {
    const res = await fetch('prs.json', { cache: 'no-store' });
    const items = (await res.json()).filter(pr => pr.merged_at || pr.state === 'open');
    if (!items?.length) { el.innerHTML = '<span class="pr-loading">No PRs yet.</span>'; return; }
    el.innerHTML = items.map(pr => {
      const state = pr.merged_at ? 'merged' : pr.state;
      const date = new Date(pr.updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const label = state[0].toUpperCase() + state.slice(1);
      return `<div class="pr-row">
        <span class="pr-date">${date}</span>
        <a href="${pr.html_url}" class="pr-title" target="_blank" rel="noopener">${pr.title}</a>
        <span class="pr-state pr-${state}">${label}</span>
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = '<span class="pr-loading">Failed to load PRs.</span>';
  }
})();
</script>
</body>
</html>
