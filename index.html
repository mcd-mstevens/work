<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work — Monte Carlo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="doc">

  <h1 class="cover-title">Work</h1>

  <div class="section">
    <p class="section-label">Lovable</p>
    <div class="group">
      <a href="https://mc-1.lovable.app/" class="group-link" target="_blank" rel="noopener">
        <span class="group-name">Monte Carlo</span>
        <span class="link-badge link-badge-green">88% real</span>
      </a>
      <a href="https://mc-ia.lovable.app/" class="group-link" target="_blank" rel="noopener">
        <span class="group-name">Monte Carlo</span>
        <span class="link-badge link-badge-orange">WIP</span>
      </a>
      <a href="https://b0b.lovable.app/" class="group-link" target="_blank" rel="noopener">
        <span class="group-name">Bob</span>
        <span class="link-badge">Archive</span>
      </a>
      <a href="https://mc-2.lovable.app/" class="group-link" target="_blank" rel="noopener">
        <span class="group-name">Bob</span>
        <span class="link-badge link-badge-purple">Exploration</span>
      </a>
    </div>
  </div>

  <div class="section">
    <p class="section-label">Miscellaneous</p>
    <div class="group">
      <a href="oh-snap.html" class="group-link">
        <span class="group-name">Oh snap</span>
        <span class="link-badge link-badge-purple">Prototype</span>
      </a>
      <a href="cli-principles.html" class="group-link">
        <span class="group-name">Principles for a better CLI</span>
        <span class="link-badge">Reference</span>
      </a>
      <a href="api-reference.html" class="group-link">
        <span class="group-name">MC Tooling Cheat Sheet</span>
        <span class="link-badge">Reference</span>
      </a>
      <a href="alert-detail-report.html" class="group-link">
        <span class="group-name">Alert Detail Page — Usage Report</span>
        <span class="link-badge link-badge-orange">Report</span>
      </a>
    </div>
  </div>

  <div class="section">
    <p class="section-label">Frontend pull requests</p>
    <div class="group">
      <div id="pr-list"><span class="pr-loading">Loading…</span></div>
    </div>
  </div>

</div>

<script>
(async function () {
  const el = document.getElementById('pr-list');
  try {
    const res = await fetch('prs.json');
    const items = await res.json();
    if (!items?.length) { el.innerHTML = '<span class="pr-loading">No PRs yet.</span>'; return; }
    el.innerHTML = items.map(pr => {
      const state = pr.merged_at ? 'merged' : pr.state;
      const date = new Date(pr.updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const label = state[0].toUpperCase() + state.slice(1);
      return `<div class="pr-row">
        <span class="pr-date">${date}</span>
        <a href="${pr.html_url}" class="pr-title" target="_blank" rel="noopener">${pr.title}</a>
        <span class="pr-state pr-${state}">${label}</span>
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = '<span class="pr-loading">Failed to load PRs.</span>';
  }
})();
</script>
</body>
</html>
