<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>demos</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', monospace; padding: 48px 32px; min-height: 100vh; }
h1 { font-size: 14px; color: #555; font-weight: 400; margin-bottom: 32px; }
a.demo { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 0.5px solid #1e1e1e; text-decoration: none; color: #e0e0e0; transition: color 0.1s; }
a.demo:first-of-type { border-top: 0.5px solid #1e1e1e; }
a.demo:hover { color: #4ade80; }
.name { font-size: 13.5px; }
.desc { font-size: 12px; color: #555; margin-left: auto; }
</style>
</head>
<body>
<h1>~/demos</h1>
</body>
</html>
